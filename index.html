function getChoiceVal(val){
  if(!val)return"";
  if(typeof val==="string"){
    if(val.startsWith("{"))try{return JSON.parse(val)?.Value||"";}catch{}
    return val;
  }
  if(typeof val==="object")return val?.Value||"";
  return String(val);
}
function getCadence(val){return getChoiceVal(val);}
function today(){return new Date().toISOString().slice(0,10);}
function fD(d){if(!d)return"—";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fT(d){if(!d)return"—";return new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}
function fDT(d){if(!d)return"—";return fD(d)+" "+fT(d);}
function daysLeft(due){if(!due)return null;const diff=Math.ceil((new Date(due)-new Date())/(864e5));return diff;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function inRange(d,from,to){if(!d)return false;const t=new Date(d).getTime();return t>=new Date(from).getTime()&&t<=new Date(to).getTime()+864e5;}
function periodKey(cadence,dayOfWeek,dayOfMonth){
  const now=new Date();
  if(cadence==="Daily")return now.toISOString().slice(0,10);
  if(cadence==="Weekly"){
    const mon=new Date(now);mon.setDate(mon.getDate()-(mon.getDay()+6)%7);
    return now.toISOString().slice(0,4)+"-W"+String(Math.ceil((mon.getDate())/7)).padStart(2,"0")+"-"+(dayOfWeek??0);
  }
  if(cadence==="Monthly")return now.toISOString().slice(0,7)+"-"+(dayOfMonth??1);
  return today();
}

const lUrl=name=>`${SITE}/lists/${name}/items`;
const iUrl=(name,id)=>`${SITE}/lists/${name}/items/${id}/fields`;

async function gGet(token,url){const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)throw new Error(`GET ${r.status}: ${url}`);return r.json();}
async function gAll(token,url){let a=[],n=url;while(n){const d=await gGet(token,n);a=a.concat(d.value||[]);n=d["@odata.nextLink"]||null;}return a;}
async function gPost(token,url,fields){const r=await fetch(url,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({fields})});if(!r.ok)throw new Error(`POST ${r.status}`);return r.json();}
async function gPatch(token,url,fields){const r=await fetch(url,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(fields)});if(!r.ok)throw new Error(`PATCH ${r.status}`);return r.json();}

async function safeGet(token,name,url){try{const r=await gAll(token,url);console.log(`[PMH] ${name}: ${r.length}`);return r;}catch(e){console.warn(`[PMH] ${name} failed:`,e.message);return[];}}

function detectRole(emp,adminEmails,msalEmail){
  // Admin check first — by Employees email OR raw MSAL login email (handles domain mismatch)
  const empEmail=emp?.Email?.toLowerCase()||"";
  const loginEmail=(msalEmail||"").toLowerCase();
  const adminList=adminEmails.map(e=>e.toLowerCase());
  if(adminList.includes(empEmail)||adminList.includes(loginEmail)||
     adminList.some(a=>a.split("@")[0]===loginEmail.split("@")[0])){return"admin";}
  // Then check PMHubRole override
  if(emp?.PMHubRole)return emp.PMHubRole.toLowerCase();
  const t=emp?.JobTitle||"";
  if(t==="Virtual Assistant")return"denied";
  if(t==="Property Manager"||t==="Assistant Property Manager")return"pm-onsite";
  if(t==="AR Specialist")return"ar";
  if(t==="Regional/Portfolio Manager")return"regional";
  if(t==="Owner/Operator")return"admin";
  return null;
}

// Helper — true for any PM variant
function isAnyPM(role){return role==="pm"||role==="pm-onsite"||role==="pm-remote";}
function isOnsitePM(role){return role==="pm"||role==="pm-onsite";}
function isRemotePM(role){return role==="pm-remote";}

        <label style={{...S.label,marginTop:8}}>Category *</label>
        <select style={S.select} value={vaCategory} onChange={e=>setVACategory(e.target.value)}>
          <option value="">Select...</option>
          {catList.map(c=><option key={c}>{c}</option>)}
        </select>
        <label style={{...S.label,marginTop:8}}>Task Description *</label>
        <input style={S.input} value={vaDesc} onChange={e=>setVADesc(e.target.value)}/>
        <label style={{...S.label,marginTop:8}}>Notes for VA</label>
        <input style={S.input} value={vaNotes} onChange={e=>setVANotes(e.target.value)} placeholder="Context, resident info, etc."/>
      </div>}

      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16,paddingTop:12,borderTop:`1px solid ${C.b1}`}}>
        <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={onClose}>Cancel</button>
        <button style={{...S.btn(C.g5,C.dk),...S.sm}} onClick={()=>{
          if(type==="tag"&&!tagTarget)return;
          if(type==="va"&&(!vaProp||!vaCategory||!vaDesc))return;
          if(type==="va"&&!assignedVA)return;
          onRoute(task,type,{tagTarget,tagMsg,vaCategory,vaDesc,vaNotes,vaProp,assignedVA});
          onClose();
        }}>Route →</button>
      </div>
    </div>
  </div>;
}

// ============================================================
// TASK CARD
// ============================================================
function TaskCard({task,onStart,onComplete,onFlagHelp,onOpenDetail,role,myEmail}){
  const isOwn=!task.PMEmail||task.PMEmail.toLowerCase()===myEmail?.toLowerCase();
  const taskLabel=task.Description||task.Title||"";
  const canAct=isOwn||(role==="admin"||role==="regional");
  const dl=task.DueDate?daysLeft(task.DueDate):null;
  const overdue=task.Cadence!=="Daily"&&dl!==null&&dl<=0&&task.Status!=="Completed"&&task.Status!=="Missed";
  const dueSoon=dl!==null&&dl<=3&&dl>0&&task.Status!=="Completed";

  let leftBorder=C.b2;
  if(getChoiceVal(task.Status)==="Missed")leftBorder=C.er;
  else if(overdue)leftBorder=C.er;
  else if(dueSoon)leftBorder=C.wn;
  else if(getChoiceVal(task.Status)==="Completed")leftBorder=C.ok;
  else if(getChoiceVal(task.Priority)==="Urgent")leftBorder=C.er;
  else if(getChoiceVal(task.Priority)==="High")leftBorder=C.wn;

  return<div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.b1}`,opacity:getChoiceVal(task.Status)==="Completed"?0.6:1}}>
    <span style={{fontSize:15,flexShrink:0}}>{catIcon[task.Category]||"📋"}</span>
    <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onOpenDetail&&onOpenDetail(task)}>
      <div style={{fontSize:13,fontWeight:500,color:getChoiceVal(task.Status)==="Missed"?C.er:C.t7,textDecoration:getChoiceVal(task.Status)==="Completed"?"line-through":"none"}}>
        {taskLabel}
        {task.ContextNotes&&<span style={{fontSize:10,color:C.t4,marginLeft:6,fontWeight:400}}>tap for details ›</span>}
      </div>
      <div style={{fontSize:11,color:C.b4,marginTop:2,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span>{task.PropertyName||"General"}</span>
        {task.Priority!=="Normal"&&<Badge type={getChoiceVal(task.Priority)==="Urgent"?"error":"warning"}>{getChoiceVal(task.Priority)}</Badge>}
        {getChoiceVal(task.Status)==="Completed"&&<Badge type="success">Done {task.CompletionStatus==="Late"?"(Late)":""}</Badge>}
        {getChoiceVal(task.Status)==="Missed"&&<Badge type="error">Missed</Badge>}
        {getChoiceVal(task.Status)==="Help Needed"&&<Badge type="warning">Help Needed</Badge>}
        
        {overdue&&task.Status!=="Missed"&&<span style={{fontSize:10,color:C.er,fontWeight:700}}>⚠ Overdue</span>}
        {dueSoon&&task.Status!=="Completed"&&<span style={{fontSize:10,color:C.wn,fontWeight:700}}>Due in {dl}d</span>}
        {task.DueDate&&task.Status!=="Completed"&&!overdue&&!dueSoon&&<span style={{fontSize:10,color:C.t4}}>Due {fD(task.DueDate)}</span>}
      </div>
    </div>
    {canAct&&task.Status!=="Completed"&&task.Status!=="Missed"&&<div style={{display:"flex",gap:4,flexShrink:0}}>
      {(getChoiceVal(task.Status)==="Queued"||getChoiceVal(task.Status)==="In Progress")&&canAct&&<button style={{...S.btn(C.ok),...S.xs}} onClick={()=>onComplete&&onComplete(task,"")}>✓ Done</button>}
      <button style={{...S.btnO(C.wn,C.wn),...S.xs}} onClick={()=>onFlagHelp&&onFlagHelp(task)}>🚩</button>
    </div>}
  </div>;
}

// CHECKLIST SECTION
// ============================================================
function ChecklistSection({label,icon,tasks,onStart,onComplete,onFlagHelp,onOpenDetail,role,myEmail,defaultOpen=true}){
  const[open,setOpen]=useState(defaultOpen);
  const done=tasks.filter(t=>getChoiceVal(t.Status)==="Completed").length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  return<div style={S.card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",paddingBottom:open?10:0,borderBottom:open?`1px solid ${C.b1}`:"none",marginBottom:open?8:0}} onClick={()=>setOpen(o=>!o)}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span>{icon}</span>
        <span style={{fontSize:13,fontWeight:700,color:C.t7,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</span>
        <span style={{fontSize:12,color:C.b4}}>{done} of {total} complete</span>
        <div style={{width:70,height:4,background:C.b1,borderRadius:99,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:pct===100?C.ok:pct>=50?C.wn:C.er,borderRadius:99}}/>
        </div>
      </div>
      <span style={{fontSize:11,color:C.b4}}>{open?"▼":"▶"}</span>
    </div>
    {open&&<div>
      {!tasks.length&&<div style={{textAlign:"center",padding:"14px 0",color:C.b3,fontSize:12,fontStyle:"italic"}}>No tasks for this period.</div>}
      {tasks.map((t,i)=><TaskCard key={t.id||t._localId||i} task={t} onStart={onStart} onComplete={onComplete} onFlagHelp={onFlagHelp} onOpenDetail={onOpenDetail} role={role} myEmail={myEmail}/>)}
    </div>}
  </div>;
}

function VAReviewSection({reviews,onReply,onResolve,myEmail}){
  const[expanded,setExpanded]=useState({});
  const[replyText,setReplyText]=useState({});
  // Reviews already filtered to this PM's properties in loadAll
  const myProps=reviews.filter(r=>r.ActivityType==="Review");
  // Only show in checklist if VA was last to touch it (PM hasn't responded yet)
  const pending=myProps.filter(r=>r.Status==="Pending");
  if(!pending.length)return null;
  return<div style={{...S.card,borderLeft:`3px solid ${C.er}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:700,color:C.er}}>🚩 Needs Your Review ({pending.length})</div>
    </div>
    {pending.map((r,i)=>{
      const isOpen=expanded[r.id];
      const thread=(reviews||[]).filter(x=>x.GroupId===r.GroupId&&x.ActivityType==="ReviewResponse").sort((a,b)=>a.ActivityDate?.localeCompare(b.ActivityDate));
      const lastResponse=thread[thread.length-1];
      return<div key={r.id||i} style={{borderBottom:`1px solid ${C.b1}`,paddingBottom:14,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:C.t7,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>
            {(r.VAName||r.RequestorName||"VA").split(" ").map(w=>w[0]).slice(0,2).join("")}
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.t7}}>{r.VAName||r.RequestorName} · {r.PropertyName}</div>
            <div style={{fontSize:11,color:C.b4}}>{r.Category} · {fDT(r.ActivityDate)} · {(thread.length||0)+1} message{(thread.length||0)>0?"s":""}</div>
          </div>
          <Badge type={r.Status==="Responded"?"info":"warning"}>{r.Status==="Responded"?"PM Replied":"Awaiting Response"}</Badge>
        </div>
        <div style={{background:C.b1,borderRadius:4,padding:"7px 10px",marginBottom:4}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t4,marginBottom:2}}>{r.VAName||"VA"} · {fDT(r.ActivityDate)}</div>
          <div style={{fontSize:12,color:C.b6}}>"{r.Notes}"</div>
        </div>
        {lastResponse&&<div style={{background:C.okb,borderRadius:4,padding:"7px 10px",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:C.ok,marginBottom:2}}>{lastResponse.AssignedByName||"You"} · {fDT(lastResponse.ActivityDate)}</div>
          <div style={{fontSize:12,color:C.b6}}>"{lastResponse.Notes}"</div>
        </div>}
        {thread.length>1&&<button style={{...S.btnO(C.t4,C.t1),...S.xs,marginBottom:8}} onClick={()=>setExpanded(p=>({...p,[r.id]:!p[r.id]}))}>
          {isOpen?"Hide":"Show full thread"} ({thread.length+1} messages)
        </button>}
        {isOpen&&thread.slice(0,-1).map((msg,mi)=><div key={mi} style={{background:msg.VAEmail===r.VAEmail?C.b1:C.okb,borderRadius:4,padding:"6px 10px",marginBottom:4}}>
          <div style={{fontSize:10,fontWeight:700,color:msg.VAEmail===r.VAEmail?C.t4:C.ok,marginBottom:2}}>{msg.AssignedByName||msg.VAName}</div>
          <div style={{fontSize:12,color:C.b6}}>{msg.Notes}</div>
        </div>)}
        {!isOpen&&<div>
          <textarea style={{...S.input,minHeight:52,resize:"vertical",marginBottom:6}} placeholder="Type your response..." value={replyText[r.id]||""} onChange={e=>setReplyText(p=>({...p,[r.id]:e.target.value}))}/>
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.btn(C.t7),...S.sm,flex:1}} onClick={()=>{if(replyText[r.id]?.trim()){onReply(r.id,replyText[r.id]);setReplyText(p=>({...p,[r.id]:""}));}}} >Reply</button>
            <button style={{...S.btn(C.ok),...S.sm,flex:1}} onClick={()=>{onResolve(r.id,replyText[r.id]||"");setReplyText(p=>({...p,[r.id]:""}));}}>✓ Mark Resolved</button>
          </div>
        </div>}

    })}
    <div style={{fontSize:11,color:C.b4,marginTop:4}}>Full conversation threads on the <strong>VA Tasks</strong> tab.</div>
  </div>;
}

// ============================================================
// MY CHECKLIST VIEW
// ============================================================
function MyChecklistView({data,tasks,role,myEmail,myEmp,myProps,onStart,onComplete,onFlagHelp,onCompleteAdhoc,onReplyReview,onResolveReview,reviews,fl}){
  const[detailTask,setDetailTask]=useState(null);
  const[helpTask,setHelpTask]=useState(null);

  const daily=tasks.filter(t=>getCadence(t.Cadence)==="Daily"&&t.Status!=="Missed"&&(
    t.ActivityDate?.slice(0,10)===today()||getChoiceVal(t.Status)==="Completed"&&t.CompletedAt?.slice(0,10)===today()
  ));
  const weekly=tasks.filter(t=>getCadence(t.Cadence)==="Weekly"&&t.Status!=="Missed"&&(
    getChoiceVal(t.Status)!=="Completed"||(t.CompletedAt&&(new Date()-new Date(t.CompletedAt))<7*864e5)
  )&&(t.ActivityDate&&(new Date()-new Date(t.ActivityDate))<7*864e5));
  const monthly=tasks.filter(t=>getCadence(t.Cadence)==="Monthly"&&t.Status!=="Missed"&&(
    getChoiceVal(t.Status)!=="Completed"||(t.CompletedAt&&(new Date()-new Date(t.CompletedAt))<31*864e5)
  )&&(t.ActivityDate&&(new Date()-new Date(t.ActivityDate))<31*864e5));
  const adhoc=tasks.filter(t=>getCadence(t.Cadence)==="Ad-Hoc"&&t.Status!=="Completed"&&t.Status!=="Missed");
  const completedToday=tasks.filter(t=>getChoiceVal(t.Status)==="Completed"&&t.CompletedAt?.slice(0,10)===today());
  const missed=tasks.filter(t=>getChoiceVal(t.Status)==="Missed");
  const totalActive=daily.length+weekly.length+monthly.length+adhoc.length;
  const doneToday=completedToday.length;
  const onTimePct=completedToday.length?Math.round(completedToday.filter(t=>t.CompletionStatus==="On Time").length/completedToday.length*100):null;

  function handleRoute(task,type,opts){
    if(type==="peer")onFlagHelp&&onFlagHelp(task,"peer",{});
    else if(type==="tag")onFlagHelp&&onFlagHelp(task,"tag",opts);
    else if(type==="va")onFlagHelp&&onFlagHelp(task,"va",opts);
    fl(type==="peer"?"Added to Help Queue — any available PM can claim it":type==="tag"?`Tagged ${opts.tagTarget} — they've been notified`:`VA task sent to ${opts.assignedVA?.Name}`);
  }

  return<div style={S.content}>
    {/* KPI Strip */}
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      <KPI label="Today Complete" value={doneToday} color={doneToday>0?C.ok:C.b4}/>
      <KPI label="Remaining" value={totalActive-doneToday} color={totalActive-doneToday>0?C.wn:C.ok}/>
      {onTimePct!==null&&<KPI label="On Time %" value={`${onTimePct}%`} color={onTimePct>=80?C.ok:onTimePct>=60?C.wn:C.er}/>}
      <KPI label="Help Needed" value={tasks.filter(t=>getChoiceVal(t.Status)==="Help Needed").length} color={tasks.filter(t=>getChoiceVal(t.Status)==="Help Needed").length?C.wn:C.ok}/>
      <KPI label="Missed" value={missed.length} color={missed.length?C.er:C.ok}/>
      <KPI label="Ad-Hoc" value={adhoc.length} color={adhoc.length?C.inf:C.b4}/>
    </div>

    {/* VA Review Items */}
    <VAReviewSection reviews={reviews} onReply={onReplyReview} onResolve={onResolveReview} myEmail={myEmail}/>

    {/* Checklist sections */}
    <ChecklistSection label="Daily" icon="📋" tasks={daily} onStart={onStart} onComplete={onComplete} onFlagHelp={setHelpTask} onOpenDetail={setDetailTask} role={role} myEmail={myEmail}/>
    <ChecklistSection label="Weekly" icon="📅" tasks={weekly} onStart={onStart} onComplete={onComplete} onFlagHelp={setHelpTask} onOpenDetail={setDetailTask} role={role} myEmail={myEmail} defaultOpen={!!weekly.filter(t=>t.Status!=="Completed").length}/>
    <ChecklistSection label="Monthly" icon="🗓" tasks={monthly} onStart={onStart} onComplete={onComplete} onFlagHelp={setHelpTask} onOpenDetail={setDetailTask} role={role} myEmail={myEmail} defaultOpen={!!monthly.filter(t=>t.Status!=="Completed").length}/>

    {adhoc.length>0&&<div style={S.card}>
      <div style={{...S.cardT,color:C.inf}}>📌 Ad-Hoc Tasks Assigned to You ({adhoc.length})</div>
      {adhoc.map((t,i)=><TaskCard key={t.id||i} task={t} onStart={onStart} onComplete={onCompleteAdhoc||onComplete} onFlagHelp={setHelpTask} onOpenDetail={setDetailTask} role={role} myEmail={myEmail}/>)}
    </div>}

    {missed.length>0&&<div style={{...S.card,opacity:.7}}>
      <div style={{...S.cardT,color:C.er}}>⚠ Missed Tasks ({missed.length})</div>
      {missed.map((t,i)=><TaskCard key={t.id||i} task={t} onOpenDetail={setDetailTask} role={role} myEmail={myEmail}/>)}
    </div>}

    {detailTask&&<TaskDetailModal task={detailTask} onClose={()=>setDetailTask(null)} onComplete={(t,n)=>{onComplete(t,n);setDetailTask(null);}} onFlagHelp={t=>{setHelpTask(t);setDetailTask(null);}} role={role}/>}
    {helpTask&&<FlagHelpModal task={helpTask} data={data} myEmail={myEmail} myEmp={myEmp} onRoute={handleRoute} onClose={()=>setHelpTask(null)}/>}
  </div>;
}

      <button style={{...S.btn(C.ok),...S.xs}} onClick={()=>onResolve(review.id,"")}>✓ Mark Resolved</button>
    </div>}
    {open&&<div style={{marginTop:8}}>
      <textarea style={{...S.input,minHeight:52,marginBottom:6,resize:"vertical",fontSize:12}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Type your response..."/>
      <div style={{display:"flex",gap:6}}>
        <button style={{...S.btn(C.t7),...S.sm,flex:1}} onClick={()=>{if(note.trim()){onReply(review.id,note);setNote("");setOpen(false);}}}>Send Reply</button>
        <button style={{...S.btn(C.ok),...S.sm,flex:1}} onClick={()=>{onResolve(review.id,note||"");setNote("");setOpen(false);}}>Reply & Resolve</button>
        <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>{setNote("");setOpen(false);}}>Cancel</button>
      </div>
    </div>}
  </div>;
}

// VA TASKS TAB — shared component (matches VA Tracker Manager View)

function VATasksView({data,reviews,allResponses,myEmail,myEmp,role,onReplyReview,onResolveReview,onSubmitVATask,fl}){
  const[prop,setProp]=useState("");
  const[cat,setCat]=useState("");
  const[pri,setPri]=useState("Normal");
  const[desc,setDesc]=useState("");
  const[notes,setNotes]=useState("");

  const isLeslie=myEmp?.JobTitle==="AR Specialist"||(role==="ar");
  const allProps=data?.properties||[];
  const myPortfolioProps=role==="ar"||role==="admin"||role==="regional"?allProps:allProps.filter(p=>{const pm=data?.pms?.find(e=>e.Email?.toLowerCase()===myEmail?.toLowerCase());return pm||true;});

  // Reviews pre-filtered to this PM's properties in loadAll — VA_Activity has no PMEmail column
  const pendingReviews=(reviews||[]).filter(r=>(r.ActivityType==="Review"||r.ActivityType==="ReviewRequest")&&r.Status!=="Resolved");
  const myActivityProps=role==="ar"||role==="admin"||role==="regional"?allProps:allProps.filter(p=>{
    const portfolio=data?.portfolios?.find(pf=>pf.PropertyId===p.Title||pf.PropertyId===p.id);
    return portfolio&&data?.vas?.find(v=>v.Email?.toLowerCase()===portfolio.VAEmail?.toLowerCase());
  });

  const vaActivities=(data?.vaActivities||[]).filter(a=>{
    if(role==="ar")return a.AssignedByEmail?.toLowerCase()===myEmail?.toLowerCase();
    if(role==="admin"||role==="regional")return true;
    return myActivityProps.some(p=>p.Title===a.PropertyName||p.PropertyName===a.PropertyName);
  });

  const selectedProp=allProps.find(p=>p.Title===prop||p.id===prop);
  const routedVA=selectedProp&&data?.portfolios?.find(pf=>pf.PropertyId===selectedProp.Title||pf.PropertyId===selectedProp.id);
  const routedVAName=routedVA&&data?.vas?.find(v=>v.Email?.toLowerCase()===routedVA.VAEmail?.toLowerCase())?.Name;

  function submit(){
    if(!prop||!cat||!desc.trim()){fl("Please fill in Property, Category, and Task");return;}

    onSubmitVATask&&onSubmitVATask({prop,cat,pri,desc,notes,routedVA});
    fl(`Task sent to ${routedVAName} — visible in VA Tracker immediately`);
    setProp("");setCat("");setPri("Normal");setDesc("");setNotes("");
  }

  return<div style={S.content}>
    {/* Needs Your Review */}
    {pendingReviews.length>0&&<div style={{...S.card,borderTop:`3px solid ${C.er}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:C.er}}>🚩 Needs Your Review — {pendingReviews.length} items</div>
      </div>
      <div style={{fontSize:12,color:C.b4,marginBottom:12}}>VAs flagged these tasks and are waiting on your response</div>
      {pendingReviews.map((r,i)=><div key={r.id||i} style={{borderBottom:`1px solid ${C.b1}`,paddingBottom:14,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:C.t7,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>
            {(r.VAName||"VA").split(" ").map(w=>w[0]).slice(0,2).join("")}
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.t7}}>{r.VAName} · {r.PropertyName}</div>
            <div style={{fontSize:11,color:C.b4}}>{r.Category} · {fDT(r.ActivityDate)} · <strong>{((allResponses||[]).filter(x=>x.GroupId===r.GroupId).length||0)+1} messages</strong></div>
          </div>
        </div>
        <div style={{background:C.b1,borderRadius:4,padding:"7px 10px",marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t4,marginBottom:2}}>{r.VAName} · {fDT(r.ActivityDate)}</div>
          <div style={{fontSize:13,color:C.b6}}>"{r.Notes}"</div>

        <ReviewReplyBox review={r} allResponses={allResponses} myEmail={myEmail} myName={myEmp?.Name} onReply={onReplyReview} onResolve={onResolveReview}/>

    {/* Property Cards */}
    <div style={{...S.card}}>
      <div style={S.cardT}>📋 Currently Active on Your Portfolio</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {myActivityProps.slice(0,6).map((p,i)=>{
          const acts=vaActivities.filter(a=>a.PropertyName===p.PropertyName||a.PropertyName===p.Title);
          const done=acts.filter(a=>getChoiceVal(a.Status)==="Completed").length;
          const pending=acts.filter(a=>getChoiceVal(a.Status)==="Queued"||getChoiceVal(a.Status)==="In Progress").length;
          const blocked=acts.filter(a=>getChoiceVal(a.Status)==="Blocked").length;
          const portfolio=data?.portfolios?.find(pf=>pf.PropertyId===p.Title||pf.PropertyId===p.id);

    {/* Submit Task for VA */}
    <div style={{...S.card,borderLeft:`3px solid ${C.g5}`}}>

      <div style={{...S.row,marginBottom:10}}>
        <div style={{flex:2,minWidth:170}}>
          <label style={S.label}>Property *</label>
          <select style={S.select} value={prop} onChange={e=>setProp(e.target.value)}>
            <option value="">Select property...</option>
            {allProps.map(p=><option key={p.id} value={p.Title||p.id}>{p.PropertyName||p.Title}</option>)}
          </select>
          {prop&&routedVAName&&<div style={{fontSize:11,color:C.ok,marginTop:3}}>→ Routes to: {routedVAName}</div>}
          {prop&&!routedVAName&&<div style={{fontSize:11,color:C.er,marginTop:3}}>⚠ No VA assigned to this property</div>}
        </div>
        <div style={{flex:2,minWidth:140}}>
          <label style={S.label}>Category *</label>
          <select style={S.select} value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="">Select...</option>
            {catList.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{minWidth:90,maxWidth:110}}>
          <label style={S.label}>Priority</label>
          <select style={S.select} value={pri} onChange={e=>setPri(e.target.value)}>
            {["Normal","High","Urgent"].map(p=><option key={p}>{p}</option>)}

        </div>
      </div>
      <div style={{marginBottom:8}}><label style={S.label}>Task *</label><input style={S.input} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What needs to be done..."/></div>

    {/* Recent Activity */}
    <div style={S.card}>

              <td style={{...S.td,whiteSpace:"nowrap"}}>{fD(a.ActivityDate)}</td>

  </div>;
}

function RegionalView({data,allTasks,queue,dfFrom,dfTo,setDfFrom,setDfTo,onToggleAbsence,fl}){
  const[pmFilter,setPMFilter]=useState("all");
  const pms=data?.pms||[];
  const outPMs=new Set(pms.filter(p=>p.PMTrackerStatus==="Out").map(p=>p.Email?.toLowerCase()));

  const filteredTasks=allTasks.filter(t=>{
    if(!inRange(t.ActivityDate||t.DueDate,dfFrom,dfTo))return false;
    if(pmFilter!=="all"&&t.PMEmail?.toLowerCase()!==pmFilter)return false;
    return true;
  });
  const total=filteredTasks.length;
  const done=filteredTasks.filter(t=>getChoiceVal(t.Status)==="Completed").length;
  const late=filteredTasks.filter(t=>t.CompletionStatus==="Late").length;
  // Exclude Out PMs from missed count
  const missed=filteredTasks.filter(t=>getChoiceVal(t.Status)==="Missed"&&!outPMs.has(t.PMEmail?.toLowerCase())).length;
  const onTimePct=done?Math.round((done-late)/done*100):null;
  const openHelp=queue.filter(q=>q.Status==="Open").length;
  const coverage=queue.filter(q=>q.IsCoverage).length;

  const pmStats=pms.map(pm=>{
    const isOut=pm.PMTrackerStatus==="Out";
    const pmTasks=filteredTasks.filter(t=>t.PMEmail?.toLowerCase()===pm.Email?.toLowerCase());
    const pmDone=pmTasks.filter(t=>getChoiceVal(t.Status)==="Completed").length;
    const pmLate=pmTasks.filter(t=>t.CompletionStatus==="Late").length;
    // Don't count missed against Out PMs
    const pmMissed=isOut?0:pmTasks.filter(t=>getChoiceVal(t.Status)==="Missed").length;
    return{...pm,isOut,total:pmTasks.length,done:pmDone,late:pmLate,missed:pmMissed,onTimePct:pmDone?Math.round((pmDone-pmLate)/pmDone*100):null};
  });

  return<div style={S.content}>
    {/* Out PMs banner */}
    {outPMs.size>0&&<div style={{...S.card,borderLeft:`3px solid ${C.er}`,background:"rgba(196,75,59,0.04)",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.er,marginBottom:6}}>🚨 PMs Currently Out ({outPMs.size})</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {pms.filter(p=>p.PMTrackerStatus==="Out").map(p=><div key={p.Email} style={{display:"flex",alignItems:"center",gap:6,background:C.white,border:`1px solid ${C.er}`,borderRadius:4,padding:"4px 10px"}}>
          <span style={{fontSize:12,fontWeight:600,color:C.er}}>{p.Name}</span>
          <button style={{...S.btn(C.ok),...S.xs}} onClick={()=>onToggleAbsence&&onToggleAbsence(p)}>Mark In</button>
        </div>)}
      </div>
    </div>}

    {/* Filters */}
    <div style={{...S.card,padding:"10px 14px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
      <div><label style={S.label}>From</label><input type="date" style={{...S.input,width:140}} value={dfFrom} onChange={e=>setDfFrom(e.target.value)}/></div>
      <div><label style={S.label}>To</label><input type="date" style={{...S.input,width:140}} value={dfTo} onChange={e=>setDfTo(e.target.value)}/></div>
      <div style={{flex:1,minWidth:160}}><label style={S.label}>PM</label>
        <select style={S.select} value={pmFilter} onChange={e=>setPMFilter(e.target.value)}>
          <option value="all">All PMs</option>
          {pms.map(pm=><option key={pm.Email} value={pm.Email?.toLowerCase()}>{pm.Name}{pm.PMTrackerStatus==="Out"?" 🔴":""}</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:5}}>
        {[{l:"7d",d:7},{l:"14d",d:14},{l:"30d",d:30}].map(p=><button key={p.l} style={{...S.btnO(C.t7,C.t1),...S.xs}} onClick={()=>{const f=new Date();f.setDate(f.getDate()-p.d);setDfFrom(f.toISOString().slice(0,10));setDfTo(today());}}>{p.l}</button>)}
      </div>
    </div>

    {/* KPIs */}
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
      <KPI label="Generated" value={total}/>
      <KPI label="Completed" value={done} color={C.ok}/>
      <KPI label="On Time %" value={onTimePct!==null?`${onTimePct}%`:"—"} color={onTimePct===null?C.b4:onTimePct>=80?C.ok:onTimePct>=60?C.wn:C.er}/>
      <KPI label="Late" value={late} color={late?C.wn:C.ok}/>
      <KPI label="Missed" value={missed} color={missed?C.er:C.ok}/>
      <KPI label="Help Queue" value={openHelp} color={openHelp?C.wn:C.ok}/>
      {coverage>0&&<KPI label="Coverage" value={coverage} color={C.wn}/>}
    </div>

    {/* PM Compliance Table */}
    <div style={S.card}>
      <div style={{...S.cardT,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>PM Compliance Breakdown</span>
        <span style={{fontSize:11,color:C.b4,fontWeight:400}}>Mark Out suppresses missed counts</span>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["PM","Status","Generated","Completed","On Time%","Late","Missed",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {pmStats.map((pm,i)=><tr key={pm.Email||i} style={{background:pm.isOut?"rgba(196,75,59,0.04)":i%2===0?C.wh:C.pg,opacity:pm.isOut?0.8:1}}>
              <td style={{...S.td,fontWeight:600,color:pm.isOut?C.er:C.t7}}>{pm.Name}</td>
              <td style={S.td}><Badge type={pm.isOut?"error":"success"}>{pm.isOut?"Out":"Active"}</Badge></td>
              <td style={S.td}>{pm.total}</td>
              <td style={S.td}>{pm.done}</td>
              <td style={S.td}><span style={{fontWeight:700,color:pm.onTimePct===null?C.b4:pm.onTimePct>=80?C.ok:pm.onTimePct>=60?C.wn:C.er}}>{pm.onTimePct!==null?`${pm.onTimePct}%`:"—"}</span></td>
              <td style={{...S.td,color:pm.late?C.wn:C.ok}}>{pm.late}</td>
              <td style={{...S.td,color:pm.missed?C.er:C.ok}}>{pm.isOut?"—":pm.missed}</td>
              <td style={S.td}><button style={{...(pm.isOut?S.btn(C.ok):S.btnO(C.er,C.er)),...S.xs}} onClick={()=>onToggleAbsence&&onToggleAbsence(pm)}>{pm.isOut?"Mark In":"Mark Out"}</button></td>
            </tr>)}
            {!pmStats.length&&<tr><td colSpan={8} style={{...S.td,textAlign:"center",color:C.b3,padding:"20px 0",fontStyle:"italic"}}>No data for this period.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>

    {/* Help Queue Summary */}
    {queue.filter(q=>q.Status==="Open").length>0&&<div style={S.card}>
      <div style={S.cardT}>Open Help Queue ({queue.filter(q=>q.Status==="Open").length})</div>
      {queue.filter(q=>q.Status==="Open").map((q,i)=><div key={q.id||i} style={{padding:"8px 0",borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,color:C.t7,fontWeight:500}}>{q.TaskTitle}</div>
          <div style={{fontSize:11,color:C.b4,marginTop:2}}>{q.RequestingPMName} · {q.PropertyName||"General"} · {fDT(q.CreatedAt)}</div>
        </div>
        <Badge type={q.Priority==="High"||q.Priority==="Urgent"?"warning":"neutral"}>{q.Priority}</Badge>
      </div>)}
    </div>}
  </div>;
}

              <td style={{...S.td,fontSize:11}}>{t.Category}</td>
              <td style={{...S.td,fontSize:11}}>{t.PropertyName||"General"}</td>
              <td style={S.td}><Badge type="neutral">{getCadence(t.Cadence)}</Badge></td>
              <td style={S.td}><Badge type={getChoiceVal(t.Status)==="Completed"?"success":getChoiceVal(t.Status)==="Missed"?"error":"warning"}>{getChoiceVal(t.Status)}</Badge></td>
              <td style={S.td}>{t.CompletionStatus&&<Badge type={t.CompletionStatus==="On Time"?"success":t.CompletionStatus==="Late"?"warning":"error"}>{t.CompletionStatus}</Badge>}</td>
            </tr>)}
            {!filtered.length&&<tr><td colSpan={8} style={{...S.td,textAlign:"center",color:C.b3,padding:"20px 0",fontStyle:"italic"}}>No history records for this period.</td></tr>}
          </tbody>
        </table>
      </div>
      {filtered.length>200&&<div style={{padding:"8px 14px",fontSize:11,color:C.b4,borderTop:`1px solid ${C.b1}`}}>Showing first 200 of {filtered.length} records.</div>}
    </div>
  </div>;
}

// ============================================================
// ADMIN TAB
// ============================================================
function AdminView({data,recurringDefs,adhocTasks,config,myEmail,myEmp,onSaveRec,onAddRec,onToggleRec,onDeleteRec,onAssignAdhoc,onMissAdhoc,onUpdateConfig,fl}){
  const[editId,setEditId]=useState(null);
  const[editFields,setEditFields]=useState({});
  const[addOpen,setAddOpen]=useState(false);
  const[adhocOpen,setAdhocOpen]=useState(false);
  const[newRec,setNewRec]=useState({desc:"",appliesTo:"All PMs",cadence:"Daily",category:"Admin/Other",priority:"Normal",contextNotes:"",adminNotes:"",onTimeCutoff:"17:00",dayOfWeek:0,dueDayOfWeek:2,dayOfMonth:1,dueDayOfMonth:5});
  const[newAdhoc,setNewAdhoc]=useState({desc:"",assignedTo:"",category:"Admin/Other",priority:"Normal",propertyId:"",dueDate:"",contextNotes:""});
  const[adhocEditId,setAdhocEditId]=useState(null);
  const[adhocEditFields,setAdhocEditFields]=useState({});

  const pms=data?.pms||[];
  const allProps=data?.properties||[];
  // Build applies-to options: groups first, then individual PMs only (not AR/Regional)
  const onsitePMs=pms.filter(p=>p.PMHubRole==="pm-onsite"||p.PMHubRole==="pm");
  const remotePMs=pms.filter(p=>p.PMHubRole==="pm-remote");
  const people=[
    {label:"All PMs",val:"all-pm",role:"all-pm"},
    {label:"All Onsite PMs",val:"pm-onsite",role:"pm-onsite"},
    {label:"All Remote PMs",val:"pm-remote",role:"pm-remote"},
    ...pms.map(p=>({label:p.Name,val:p.Email,role:p.PMHubRole||"pm"})),
  ];
  const days=["Monday","Tuesday","Wednesday","Thursday","Friday"];

  function startEdit(rec){
    setEditId(rec.id);
    setEditFields({desc:rec.Description||"",appliesTo:rec.AppliesToEmail||rec.AppliesToRole||"all-pm",cadence:rec.Cadence||"Daily",category:rec.Category||"",priority:getChoiceVal(rec.Priority)||"Normal",contextNotes:rec.ContextNotes||"",adminNotes:rec.AdminNotes||"",onTimeCutoff:rec.OnTimeCutoff||"17:00",dayOfWeek:rec.DayOfWeek??0,dueDayOfWeek:rec.DueDayOfWeek??2,dayOfMonth:rec.DayOfMonth??1,dueDayOfMonth:rec.DueDayOfMonth??5});
  }

  function saveEdit(rec){
    onSaveRec&&onSaveRec(rec.id,editFields);
    setEditId(null);
    fl("Recurring task updated — changes take effect at next generation");
  }

  function submitNewRec(){
    if(!newRec.desc.trim()||!newRec.category){fl("Description and Category are required");return;}
    onAddRec&&onAddRec(newRec);
    setAddOpen(false);
    setNewRec({desc:"",appliesTo:"All PMs",cadence:"Daily",category:"Admin/Other",priority:"Normal",contextNotes:"",adminNotes:"",onTimeCutoff:"17:00",dayOfWeek:0,dueDayOfWeek:2,dayOfMonth:1,dueDayOfMonth:5});
    fl("Recurring task added — will generate on next cycle");
  }

  function submitAdhoc(){
    if(!newAdhoc.desc.trim()||!newAdhoc.assignedTo||!newAdhoc.dueDate){fl("Assigned To, Description, and Due Date are required");return;}
    onAssignAdhoc&&onAssignAdhoc(newAdhoc);
    setAdhocOpen(false);
    setNewAdhoc({desc:"",assignedTo:"",category:"Admin/Other",priority:"Normal",propertyId:"",dueDate:"",contextNotes:""});
    fl("Ad-hoc task assigned successfully");
  }

  function startAdhocEdit(t){
    setAdhocEditId(t.id);
    setAdhocEditFields({desc:t.Description||t.Title||"",assignedTo:t.PMEmail||"",category:t.Category||"",priority:t.Priority||"Normal",propertyId:t.PropertyId||"",dueDate:t.DueDate?.slice(0,10)||"",contextNotes:t.ContextNotes||""});
  }

  function saveAdhocEdit(t){
    onSaveRec&&onSaveRec(t.id,{...adhocEditFields,_type:"adhoc"});
    setAdhocEditId(null);
    fl("Ad-hoc task updated");
  }

  const inputS={...S.input,marginBottom:0};
  const selS={...S.select,marginBottom:0};
  const fgS={marginBottom:8};

  function RField({label,children}){return<div style={fgS}><label style={S.label}>{label}</label>{children}</div>;}

  function EditPanel({fields,setFields,isWeekly,isMonthly}){
    return<div style={{background:C.t0,border:`1px solid ${C.t1}`,borderRadius:6,padding:14,marginTop:8}}>
      <RField label="Task Description"><input style={inputS} value={fields.desc} onChange={e=>setFields(p=>({...p,desc:e.target.value}))}/></RField>
      <div style={{...S.row,marginBottom:8}}>
        <div style={{flex:2}}><label style={S.label}>Applies To</label><select style={selS} value={fields.appliesTo} onChange={e=>setFields(p=>({...p,appliesTo:e.target.value}))}>{people.map(p=><option key={p.val} value={p.val}>{p.label}</option>)}</select></div>
        <div style={{flex:1}}><label style={S.label}>Category</label><select style={selS} value={fields.category} onChange={e=>setFields(p=>({...p,category:e.target.value}))}><option value="">Select...</option>{catList.map(c=><option key={c}>{c}</option>)}</select></div>
        <div style={{flex:1}}><label style={S.label}>Priority</label><select style={selS} value={fields.priority} onChange={e=>setFields(p=>({...p,priority:e.target.value}))}>{["Normal","High","Urgent"].map(p=><option key={p}>{p}</option>)}</select></div>
      </div>
      {!isWeekly&&!isMonthly&&<RField label="On-Time Cutoff"><select style={selS} value={fields.onTimeCutoff} onChange={e=>setFields(p=>({...p,onTimeCutoff:e.target.value}))}>{["15:00","16:00","17:00","18:00"].map(v=><option key={v} value={v}>{v}</option>)}</select></RField>}
      {isWeekly&&<div style={{...S.row,marginBottom:8}}>
        <div style={{flex:1}}><label style={S.label}>Generates On</label><select style={selS} value={fields.dayOfWeek} onChange={e=>setFields(p=>({...p,dayOfWeek:+e.target.value}))}>{days.map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>
        <div style={{flex:1}}><label style={S.label}>Due By</label><select style={selS} value={fields.dueDayOfWeek} onChange={e=>setFields(p=>({...p,dueDayOfWeek:+e.target.value}))}>{days.map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>
      </div>}
      {isMonthly&&<div style={{...S.row,marginBottom:8}}>
        <div style={{flex:1}}><label style={S.label}>Generates (day)</label><select style={selS} value={fields.dayOfMonth} onChange={e=>setFields(p=>({...p,dayOfMonth:+e.target.value}))}>{[1,2,3,5,10,15,20,25].map(d=><option key={d} value={d}>{d}</option>)}</select></div>
        <div style={{flex:1}}><label style={S.label}>Due By (day)</label><select style={selS} value={fields.dueDayOfMonth} onChange={e=>setFields(p=>({...p,dueDayOfMonth:+e.target.value}))}>{[1,3,5,7,10,15,20].map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      </div>}
      <RField label={<>Context / Notes <span style={{fontSize:10,color:C.g6,fontWeight:600}}>— visible to recipient when they tap the task</span></>}>
        <textarea style={{...inputS,minHeight:70,resize:"vertical"}} value={fields.contextNotes} onChange={e=>setFields(p=>({...p,contextNotes:e.target.value}))} placeholder="Step-by-step instructions, AppFolio navigation, escalation rules, SOP links..."/>
      </RField>
      <RField label="Admin Notes (not shown to recipient)">
        <input style={inputS} value={fields.adminNotes||""} onChange={e=>setFields(p=>({...p,adminNotes:e.target.value}))} placeholder="Why this task exists, compliance notes, etc."/>
      </RField>
    </div>;
  }

  // Group recurring defs by cadence+assignee
  const daily=recurringDefs.filter(r=>getCadence(r.Cadence)==="Daily");
  const weekly=recurringDefs.filter(r=>getCadence(r.Cadence)==="Weekly");
  const monthly=recurringDefs.filter(r=>getCadence(r.Cadence)==="Monthly");

  function RecGroup({label,items,isWeekly,isMonthly}){
    if(!items.length)return null;
    return<div>
      <div style={{fontSize:11,fontWeight:700,color:C.t6,textTransform:"uppercase",letterSpacing:".05em",margin:"14px 0 6px",paddingBottom:4,borderBottom:`1px solid ${C.t1}`}}>{label}</div>
      {items.map((rec,i)=>{
        const isEditing=editId===rec.id;
        const sub=rec.Cadence==="Daily"?`${rec.AppliesToName||"All PMs"} · Daily · Cutoff: ${rec.OnTimeCutoff||"17:00"}`:rec.Cadence==="Weekly"?`${rec.AppliesToName||"All PMs"} · Weekly · Gen: ${days[rec.DayOfWeek??0]} · Due: ${days[rec.DueDayOfWeek??2]}`:`${rec.AppliesToName||"All PMs"} · Monthly · Gen ${rec.DayOfMonth??1}th · Due ${rec.DueDayOfMonth??5}th`;
        return<div key={rec.id||i} style={{borderBottom:`1px solid ${C.b1}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 0"}}>
            <span style={{fontSize:14,marginTop:1,flexShrink:0}}>{catIcon[rec.Category]||"📋"}</span>
            <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>isEditing?setEditId(null):startEdit(rec)}>
              <div style={{fontSize:13,fontWeight:500,color:rec.IsActive===false?C.b3:C.t7,opacity:rec.IsActive===false?.6:1}}>{rec.Description}</div>
              <div style={{fontSize:11,color:C.b4,marginTop:2}}>{sub}</div>
              {rec.ContextNotes&&!isEditing&&<div style={{fontSize:10,color:C.b3,marginTop:2,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:420}}>"{rec.ContextNotes.slice(0,80)}{rec.ContextNotes.length>80?"…":""}"</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <Badge type={rec.IsActive===false?"warning":"success"}>{rec.IsActive===false?"Paused":"Active"}</Badge>
              <button style={{...S.btnO(C.t6,C.t1),...S.xs}} onClick={()=>isEditing?setEditId(null):startEdit(rec)}>{isEditing?"✕ Cancel":"✎ Edit"}</button>
              <button style={{...S.btnO(rec.IsActive===false?C.ok:C.wn,rec.IsActive===false?C.ok:C.wn),...S.xs}} onClick={()=>onToggleRec&&onToggleRec(rec)}>{rec.IsActive===false?"▶ On":"Pause"}</button>
              <button style={{...S.btnO(C.er,C.er),...S.xs}} onClick={()=>{if(window.confirm("Delete this recurring task?"))onDeleteRec&&onDeleteRec(rec);}}>✕</button>
            </div>
          </div>
          {isEditing&&<EditPanel fields={editFields} setFields={setEditFields} isWeekly={isWeekly} isMonthly={isMonthly}/>}
          {isEditing&&<div style={{display:"flex",gap:6,justifyContent:"flex-end",padding:"8px 0"}}>
            <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>setEditId(null)}>Cancel</button>
            <button style={{...S.btn(C.ok),...S.sm}} onClick={()=>saveEdit(rec)}>✓ Save Changes</button>
          </div>}
        </div>;
      })}
    </div>;
  }

  const actAdhoc=adhocTasks.filter(t=>t.Status!=="Completed"&&t.Status!=="Missed");
  const doneAdhoc=adhocTasks.filter(t=>getChoiceVal(t.Status)==="Completed"||getChoiceVal(t.Status)==="Missed");

  return<div style={S.content}>
    {/* Recurring Task Management */}
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.b1}`,marginBottom:4}}>
        <div style={S.cardT}>📋 Recurring Task Management</div>
        <button style={{...S.btn(C.hdr),...S.sm}} onClick={()=>setAddOpen(o=>!o)}>{addOpen?"✕ Cancel":"+ Add Task"}</button>
      </div>
      {addOpen&&<div style={{marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.t7,marginBottom:8}}>New Recurring Task</div>
        <div style={{...S.row,marginBottom:8}}>
          <div style={{flex:1}}><label style={S.label}>Cadence *</label><select style={selS} value={newRec.cadence} onChange={e=>setNewRec(p=>({...p,cadence:e.target.value}))}>{["Daily","Weekly","Monthly"].map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <EditPanel fields={newRec} setFields={setNewRec} isWeekly={newRec.cadence==="Weekly"} isMonthly={newRec.cadence==="Monthly"}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}>
          <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>setAddOpen(false)}>Cancel</button>
          <button style={{...S.btn(C.ok),...S.sm}} onClick={submitNewRec}>✓ Add Recurring Task</button>
        </div>
      </div>}
      <RecGroup label="All PMs — Daily" items={daily.filter(r=>r.AppliesToName==="All PMs"||!r.AppliesToEmail)}/>
      {pms.map(pm=><RecGroup key={pm.Email} label={`${pm.Name} — Daily`} items={daily.filter(r=>r.AppliesToEmail?.toLowerCase()===pm.Email?.toLowerCase()&&getCadence(r.Cadence)==="Daily")}/>)}
      <RecGroup label="All PMs — Weekly" items={weekly.filter(r=>r.AppliesToName==="All PMs"||!r.AppliesToEmail)} isWeekly/>
      {pms.map(pm=><RecGroup key={pm.Email+"w"} label={`${pm.Name} — Weekly`} items={weekly.filter(r=>r.AppliesToEmail?.toLowerCase()===pm.Email?.toLowerCase())} isWeekly/>)}
      <RecGroup label="All PMs — Monthly" items={monthly.filter(r=>r.AppliesToName==="All PMs"||!r.AppliesToEmail)} isMonthly/>
      {pms.map(pm=><RecGroup key={pm.Email+"m"} label={`${pm.Name} — Monthly`} items={monthly.filter(r=>r.AppliesToEmail?.toLowerCase()===pm.Email?.toLowerCase())} isMonthly/>)}
    </div>

    {/* Assign Ad-Hoc Task */}
    <div style={{...S.card,borderLeft:`3px solid ${C.g5}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.b1}`,marginBottom:12}}>
        <div>
          <div style={S.cardT}>📌 Assign Ad-Hoc Task</div>
          <div style={{fontSize:11,color:C.b4,marginTop:2}}>One-time tasks with a due date — stay in queue until completed or marked missed</div>
        </div>
        <button style={{...S.btn(C.g5,C.dk),...S.sm}} onClick={()=>setAdhocOpen(o=>!o)}>{adhocOpen?"✕ Cancel":"+ Assign Task"}</button>
      </div>
      {adhocOpen&&<div style={{background:C.g0,border:`1px solid ${C.g1}`,borderRadius:6,padding:14,marginBottom:14}}>
        <div style={{...S.row,marginBottom:8}}>
          <div style={{flex:2}}><label style={S.label}>Assign To *</label>
            <select style={selS} value={newAdhoc.assignedTo} onChange={e=>setNewAdhoc(p=>({...p,assignedTo:e.target.value}))}>
              <option value="">Select person...</option>
              <option value="all">All PMs</option>
              {pms.map(pm=><option key={pm.Email} value={pm.Email}>{pm.Name} (PM)</option>)}
              <option value="leslie">Leslie (AR Specialist)</option>
              <option value="cara">Cara Munson (Regional)</option>
            </select>
          </div>
          <div style={{flex:2}}><label style={S.label}>Category *</label><select style={selS} value={newAdhoc.category} onChange={e=>setNewAdhoc(p=>({...p,category:e.target.value}))}>{catList.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={{flex:1}}><label style={S.label}>Priority</label><select style={selS} value={newAdhoc.priority} onChange={e=>setNewAdhoc(p=>({...p,priority:e.target.value}))}>{["Normal","High","Urgent"].map(p=><option key={p}>{p}</option>)}</select></div>
        </div>
        <div style={{...S.row,marginBottom:8}}>
          <div style={{flex:2}}><label style={S.label}>Property</label><select style={selS} value={newAdhoc.propertyId} onChange={e=>setNewAdhoc(p=>({...p,propertyId:e.target.value}))}><option value="">General</option>{allProps.map(p=><option key={p.id} value={p.Title||p.id}>{p.PropertyName||p.Title}</option>)}</select></div>
          <div style={{flex:1}}><label style={S.label}>Due Date *</label><input type="date" style={inputS} value={newAdhoc.dueDate} onChange={e=>setNewAdhoc(p=>({...p,dueDate:e.target.value}))}/></div>
        </div>
        <RField label="Task Description *"><input style={inputS} value={newAdhoc.desc} onChange={e=>setNewAdhoc(p=>({...p,desc:e.target.value}))} placeholder="What needs to be done..."/></RField>
        <RField label={<>Context / Notes <span style={{fontSize:10,color:C.g6,fontWeight:600}}>— visible to recipient when they tap the task</span></>}>
          <textarea style={{...inputS,minHeight:60,resize:"vertical"}} value={newAdhoc.contextNotes} onChange={e=>setNewAdhoc(p=>({...p,contextNotes:e.target.value}))} placeholder="Background, instructions, links, relevant history..."/>
        </RField>
        <div style={{background:C.g0,border:`1px solid ${C.g1}`,borderRadius:4,padding:"7px 10px",marginBottom:10,fontSize:11,color:C.g7}}>⏳ This task stays in the recipient's queue until they complete it — or you mark it missed. It will not auto-miss.</div>
        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
          <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>setAdhocOpen(false)}>Cancel</button>
          <button style={{...S.btn(C.g5,C.dk),...S.sm}} onClick={submitAdhoc}>📌 Assign Task</button>
        </div>
      </div>}

      {/* Active adhoc list */}
      <div style={{fontSize:11,fontWeight:700,color:C.b4,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Active Ad-Hoc Tasks ({actAdhoc.length})</div>
      {!actAdhoc.length&&<div style={{textAlign:"center",padding:"16px 0",color:C.b3,fontSize:13,fontStyle:"italic"}}>No active ad-hoc tasks.</div>}
      {actAdhoc.map((t,i)=>{
        const isEditing=adhocEditId===t.id;
        const dl=t.DueDate?daysLeft(t.DueDate):null;
        return<div key={t.id||i} style={{borderBottom:`1px solid ${C.b1}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 0"}}>
            <span style={{fontSize:14,marginTop:1,flexShrink:0}}>{catIcon[t.Category]||"📌"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,color:C.t7}}>{t.Title||t.Description}</div>
              <div style={{fontSize:11,color:C.b4,marginTop:2}}>{t.PMName} · {t.Category} · {t.PropertyName||"General"} · Due: {fD(t.DueDate)}{dl!==null?<span style={{fontWeight:600,color:dl<=0?C.er:dl<=3?C.wn:C.t4}}> · {dl<=0?"Overdue":`${dl}d left`}</span>:null}</div>
              {t.ContextNotes&&!isEditing&&<div style={{fontSize:10,color:C.b3,marginTop:2,fontStyle:"italic"}}>"{t.ContextNotes.slice(0,70)}…"</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <Badge type="warning">{getChoiceVal(t.Status)}</Badge>
              <button style={{...S.btnO(C.t6,C.t1),...S.xs}} onClick={()=>isEditing?setAdhocEditId(null):startAdhocEdit(t)}>{isEditing?"✕ Cancel":"✎ Edit"}</button>
              <button style={{...S.btnO(C.er,C.er),...S.xs}} onClick={()=>{if(window.confirm("Mark this task as Missed?"))onMissAdhoc&&onMissAdhoc(t);}}>✗ Miss</button>
            </div>
          </div>
          {isEditing&&<div style={{background:C.t0,border:`1px solid ${C.t1}`,borderRadius:6,padding:14,marginBottom:8}}>
            <RField label="Task Description"><input style={inputS} value={adhocEditFields.desc} onChange={e=>setAdhocEditFields(p=>({...p,desc:e.target.value}))}/></RField>
            <div style={{...S.row,marginBottom:8}}>
              <div style={{flex:2}}><label style={S.label}>Assigned To</label><select style={selS} value={adhocEditFields.assignedTo} onChange={e=>setAdhocEditFields(p=>({...p,assignedTo:e.target.value}))}><option value="">Select...</option><option value="all">All PMs</option>{pms.map(pm=><option key={pm.Email} value={pm.Email}>{pm.Name}</option>)}<option value="leslie">Leslie</option></select></div>
              <div style={{flex:2}}><label style={S.label}>Category</label><select style={selS} value={adhocEditFields.category} onChange={e=>setAdhocEditFields(p=>({...p,category:e.target.value}))}>{catList.map(c=><option key={c}>{c}</option>)}</select></div>
              <div style={{flex:1}}><label style={S.label}>Priority</label><select style={selS} value={adhocEditFields.priority} onChange={e=>setAdhocEditFields(p=>({...p,priority:e.target.value}))}>{["Normal","High","Urgent"].map(p=><option key={p}>{p}</option>)}</select></div>
            </div>
            <div style={{...S.row,marginBottom:8}}>
              <div style={{flex:2}}><label style={S.label}>Property</label><select style={selS} value={adhocEditFields.propertyId} onChange={e=>setAdhocEditFields(p=>({...p,propertyId:e.target.value}))}><option value="">General</option>{allProps.map(p=><option key={p.id} value={p.Title||p.id}>{p.PropertyName||p.Title}</option>)}</select></div>
              <div style={{flex:1}}><label style={S.label}>Due Date</label><input type="date" style={inputS} value={adhocEditFields.dueDate} onChange={e=>setAdhocEditFields(p=>({...p,dueDate:e.target.value}))}/></div>
            </div>
            <RField label={<>Context / Notes <span style={{fontSize:10,color:C.g6,fontWeight:600}}>— visible to recipient</span></>}>
              <textarea style={{...inputS,minHeight:60,resize:"vertical"}} value={adhocEditFields.contextNotes} onChange={e=>setAdhocEditFields(p=>({...p,contextNotes:e.target.value}))}/>
            </RField>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:8}}>
              <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>setAdhocEditId(null)}>Cancel</button>
              <button style={{...S.btn(C.ok),...S.sm}} onClick={()=>saveAdhocEdit(t)}>✓ Save Changes</button>
            </div>
          </div>}
        </div>;
      })}

      {doneAdhoc.length>0&&<div style={{marginTop:10,opacity:.6}}>
        <div style={{fontSize:11,fontWeight:700,color:C.b4,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}}>Completed / Missed</div>

// ============================================================
// TASK GENERATION ENGINE (client-side safety net)
// Primary engine is Power Automate at 6AM daily.
// This runs on page load and only generates if tasks are missing
// for the current period — never auto-misses.
// ============================================================
async function generateMissingTasks(token,recurringDefs,existingActivity,myEmail,myEmp){
  const toCreate=[];
  const now=new Date();
  const todayStr=today();
  const dayOfWeek=(now.getDay()+6)%7; // 0=Mon ... 4=Fri
  const dayOfMonth=now.getDate();

  for(const def of recurringDefs){
    if(def.IsActive===false)continue;
    // Determine if this def applies to this user
    const appliesToEmail=def.AppliesToEmail?.toLowerCase();
    const appliesToRole=def.AppliesToRole?.toLowerCase();
    const isForMe=!appliesToEmail||appliesToEmail===myEmail?.toLowerCase()||appliesToRole==="pm";

    if(!isForMe)continue;

    const pk=periodKey(def.Cadence,def.DayOfWeek,def.DayOfMonth);
    // Check if this period's task already exists
    const exists=existingActivity.some(a=>a.RecurringTaskId===String(def.id||def.Id)&&a.PeriodKey===pk&&a.PMEmail?.toLowerCase()===myEmail?.toLowerCase());
    if(exists)continue;

    // For weekly: only generate on the specified day
    if(def.Cadence==="Weekly"&&(def.DayOfWeek??0)!==dayOfWeek)continue;
    // For monthly: only generate on the specified day
    if(def.Cadence==="Monthly"&&(def.DayOfMonth??1)!==dayOfMonth)continue;

    const dueDate=computeDueDate(def);
    toCreate.push({
      Title:`Task-${def.Description?.slice(0,30)||"Checklist"}`,
      ActivityType:"Checklist",
      RecurringTaskId:String(def.id||def.Id||""),
      PMEmail:myEmail,
      PMName:myEmp?.Name||myEmail,
      Category:def.Category||"Admin/Other",
      Cadence:def.Cadence,
      Status:"Queued",
      Priority:def.Priority||"Normal",
      Description:def.Description||"",
      ContextNotes:def.ContextNotes||"",
      OnTimeCutoff:def.OnTimeCutoff||"17:00",
      DueDayOfWeek:def.DueDayOfWeek??null,
      DueDayOfMonth:def.DueDayOfMonth??null,
      DueDate:dueDate,
      PeriodKey:pk,
      ActivityDate:new Date().toISOString(),
      AssignedByEmail:"system@newshirepm.com",
      AssignedByName:"Recurring Schedule",
      Source:"Recurring",
      IsActive:true,
    });
  }

  const created=[];
  for(const fields of toCreate){
    try{
      const r=await gPost(token,lUrl(CONFIG.listPMActivity),fields);
      created.push(r);
    }catch(e){console.warn("[PMH] generate failed:",e.message);}
  }
  return created;
}

function computeDueDate(def){
  const now=new Date();
  if(def.Cadence==="Daily"){
    const[hh,mm]=(def.OnTimeCutoff||"17:00").split(":").map(Number);
    const d=new Date(now);d.setHours(hh,mm,0,0);
    return d.toISOString();
  }
  if(def.Cadence==="Weekly"){
    const dueDay=def.DueDayOfWeek??2;
    const curDay=(now.getDay()+6)%7;
    const diff=(dueDay-curDay+7)%7;
    const d=new Date(now);d.setDate(d.getDate()+diff);d.setHours(17,0,0,0);
    return d.toISOString();
  }
  if(def.Cadence==="Monthly"){
    const dueDay=def.DueDayOfMonth??5;
    const d=new Date(now.getFullYear(),now.getMonth(),dueDay,17,0,0,0);
    return d.toISOString();
  }
  return now.toISOString();
}
