    try{const tk=await getToken();const myEmail=(myEmp?.Email||acct.username).toLowerCase();await gPatch(tk,iUrl(CONFIG.listHelpQueue,q.id),{Status:"Claimed",ClaimedByEmail:myEmail,ClaimedByName:myEmp?.Name||myEmail,ClaimedAt:new Date().toISOString()});await loadAll();fl("Help request claimed");}
    catch(e){fl("Error: "+e.message);}
  }

  async function resolveQueue(type,id){
    try{const tk=await getToken();
      if(type==="peer")await gPatch(tk,iUrl(CONFIG.listHelpQueue,id),{Status:"Resolved",ResolvedAt:new Date().toISOString()});
      if(type==="tag")await gPatch(tk,iUrl(CONFIG.listTags,id),{Status:"Resolved",ResolvedAt:new Date().toISOString()});
      await loadAll();fl("Resolved");
    }catch(e){fl("Error: "+e.message);}
  }

  async function replyToReview(reviewId,note){
    try{
      const tk=await getToken();
      const myEmail=(myEmp?.Email||acct.username).toLowerCase();
      const orig=data.reviews?.find(r=>r.id===reviewId||r.id===String(reviewId));
      if(!orig){
        console.error("[PMH] replyToReview: review not found. reviewId=",reviewId,"reviews=",data.reviews?.map(r=>r.id));
        fl("Error: review not found (id: "+reviewId+")");
        return;
      }
      console.log("[PMH] Replying to review:",orig.Title,"GroupId:",orig.GroupId||orig.id);
      // Match VA Tracker v3 field schema exactly - no PMEmail column in VA_Activity
      await gPost(tk,lUrl(CONFIG.listVAActivity),{Title:`Response-${orig.Title||"Review"}`,ActivityType:"ReviewResponse",VAEmail:orig.VAEmail,VAName:orig.VAName,ActivityDate:new Date().toISOString(),PropertyId:orig.PropertyId||"",PropertyName:orig.PropertyName||"General",PMName:orig.PMName||"",Category:orig.Category||"",Notes:note,Status:"Completed",GroupId:orig.GroupId||"",AssignedByEmail:myEmail,AssignedByName:myEmp?.Name||myEmail});
      await gPatch(tk,`${SITE}/lists/${CONFIG.listVAActivity}/items/${reviewId}/fields`,{Status:"Responded"});
      await loadAll();fl("Reply sent");
    }catch(e){console.error("[PMH] replyToReview error:",e);fl("Error: "+e.message);}
  }

  async function resolveReview(reviewId,note){
    try{
      const tk=await getToken();const myEmail=(myEmp?.Email||acct.username).toLowerCase();
      if(note){
        const orig=data.reviews?.find(r=>r.id===reviewId);
        if(orig)await gPost(tk,lUrl(CONFIG.listVAActivity),{Title:`Response-${orig.Title||"Review"}`,ActivityType:"ReviewResponse",VAEmail:orig.VAEmail,VAName:orig.VAName,ActivityDate:new Date().toISOString(),PropertyId:orig.PropertyId||"",PropertyName:orig.PropertyName||"General",PMName:orig.PMName||"",Category:orig.Category||"",Notes:note,Status:"Completed",GroupId:orig.GroupId||"",AssignedByEmail:myEmail,AssignedByName:myEmp?.Name||myEmail});
      }
      await gPatch(tk,`${SITE}/lists/${CONFIG.listVAActivity}/items/${reviewId}/fields`,{Status:"Resolved"});
      await loadAll();fl("Review resolved");
    }catch(e){fl("Error: "+e.message);}
  }

  // Build tab list based on role
  const TABS=useMemo(()=>{
    if(!role)return[];
    const t=[];
    if(isAnyPM(role)||role==="admin"){t.push({k:"checklist",l:"My Checklist"});}
    if(role==="ar"){t.push({k:"artasks",l:"My Tasks"});}
    t.push({k:"active",l:"Active"});
    t.push({k:"helpqueue",l:`Help Queue${(data?.helpQueue?.filter(q=>q.Status==="Open").length||0)>0?" ("+data.helpQueue.filter(q=>q.Status==="Open").length+")":""}`});
    if(role!=="ar")t.push({k:"vatasks",l:"VA Tasks"});
    if(role==="ar"||role==="admin")t.push({k:"vatasks",l:"VA Tasks"});
    if(role==="ar")t.push({k:"vatasks_ar",l:"VA Tasks"});
    if(role==="regional"||role==="admin"){t.push({k:"regional",l:"Regional Overview"});}
    if(role==="regional"||role==="admin"){t.push({k:"history",l:"History"});}
    if(role==="admin"||role==="regional"){t.push({k:"admin",l:"Admin"});}
    return t;
  },[role,effectiveRole,data?.helpQueue]);

  // Simplify: clean tabs
  const finalTabs=useMemo(()=>{
    if(!role)return[];
    const defs={
      "pm-onsite":[{k:"checklist",l:"My Checklist"},{k:"active",l:"Active"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"},{k:"oneonone",l:"My 1:1 History"}],
      "pm-remote":[{k:"checklist",l:"My Checklist"},{k:"active",l:"Active"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"},{k:"oneonone",l:"My 1:1 History"}],
      pm:[{k:"checklist",l:"My Checklist"},{k:"active",l:"Active"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"},{k:"oneonone",l:"My 1:1 History"}],
      ar:[{k:"artasks",l:"My Tasks"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"}],
      regional:[{k:"regional",l:"Regional Overview"},{k:"oneonone",l:"1:1 Sessions"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"},{k:"history",l:"History"},{k:"admin",l:"Admin"}],
      admin:[{k:"checklist",l:"My Checklist"},{k:"active",l:"Active"},{k:"helpqueue",l:"Help Queue"},{k:"vatasks",l:"VA Tasks"},{k:"regional",l:"Regional Overview"},{k:"oneonone",l:"1:1 Sessions"},{k:"history",l:"History"},{k:"admin",l:"Admin"}],
    };
    const tabs=defs[effectiveRole]||defs[role]||[];
    // Annotate help queue with count
    const openHQ=(data?.helpQueue||[]).filter(q=>q.Status==="Open").length;
    return tabs.map(t=>t.k==="helpqueue"?{...t,l:`Help Queue${openHQ>0?" ("+openHQ+")":""}`}:t);
  },[role,data?.helpQueue]);

  // Use state-persisted resolved email — avoids null-myEmp race on first render
  const myEmail=myEmailState||(myEmp?.Email||acct?.username||"").toLowerCase();

  // Guard: if email not yet resolved, show nothing rather than everything
  const myTasks=!myEmail?([]): (data?.activity||[]).filter(a=>{
    if(a.PMEmail?.toLowerCase()!==myEmail)return false;
    const cad=getCadence(a.Cadence);
    const hasCadence=cad==="Daily"||cad==="Weekly"||cad==="Monthly"||cad==="Ad-Hoc";
    const isRecurring=!!a.RecurringTaskId;
    const isAdhoc=a.ActivityType==="Ad-Hoc"||a.Source==="Assigned";
    return hasCadence||isRecurring||isAdhoc;
  });
  const adhocTasks=(data?.activity||[]).filter(a=>a.Source==="Assigned"||a.ActivityType==="Ad-Hoc");
  const arTasks=(data?.activity||[]).filter(a=>a.PMEmail?.toLowerCase()===myEmail);

  // For admin users: effective role can be toggled between admin and pm-remote
  const effectiveRole=(role==="admin"&&viewMode==="pm-remote")?"pm-remote":role;
  const finalTabsForRole=effectiveRole;

  if(!acct)return<div style={{...S.page,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>🏢</div><div style={{fontSize:15,color:C.t7,marginBottom:8}}>Signing in to PM Hub…</div></div></div>;
  if(role==="denied")return<div style={S.page}><AccessDenied email={myEmail}/></div>;
  if(loading||!myEmail)return<div style={S.page}><Spinner/></div>;

  return<div style={S.page}>
    {/* Header */}
    <div style={S.hdr}>
      <div style={{display:"flex",flexDirection:"column"}}>
        <div style={S.hdrTitle}>NEWSHIRE</div>
        <div style={S.hdrSub}>{CONFIG.appName}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={S.hdrUser}>{myEmp?.Name||acct.name||myEmail}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",marginTop:3}}>
          <div style={S.hdrRole}>{effectiveRole?.toUpperCase()}</div>
          {role==="admin"&&<button onClick={()=>setViewMode(v=>v==="admin"?"pm-remote":"admin")} style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,border:"none",cursor:"pointer",background:viewMode==="pm-remote"?C.g5:C.t1,color:viewMode==="pm-remote"?C.dk:C.t7,fontFamily:font}}>
            {viewMode==="pm-remote"?"→ Admin View":"→ PM View"}
          </button>}
        </div>
      </div>
    </div>

    {/* Flash */}
    {flash&&<Flash msg={flash}/>}

    {/* Tabs */}
    <div style={S.tabBar}>
      {finalTabs.map(t=><button key={t.k} style={S.tab(tab===t.k)} onClick={()=>setTab(t.k)}>{t.l}</button>)}
    </div>

    {/* Views */}
    {tab==="checklist"&&<MyChecklistView data={data} tasks={myTasks} role={effectiveRole} myEmail={myEmail} myEmp={myEmp} myProps={data?.properties||[]} onStart={null} onComplete={completeTask} onFlagHelp={flagHelp} onReplyReview={replyToReview} onResolveReview={resolveReview} reviews={data?.reviews||[]} fl={fl}/>}
    {tab==="active"&&<ActiveView tasks={(data?.activity||[]).filter(a=>a.PMEmail?.toLowerCase()===myEmail)} role={role} myEmail={myEmail} onStart={null} onComplete={completeTask} onFlagHelp={flagHelp} fl={fl}/>}
    {tab==="helpqueue"&&<HelpQueueView queue={data?.helpQueue||[]} tags={(data?.tags||[]).filter(t=>t.ToEmail?.toLowerCase()===myEmail)} role={role} myEmail={myEmail} myEmp={myEmp} onClaim={claimHelp} onResolveQueue={resolveQueue} fl={fl}/>}
    {tab==="vatasks"&&<VATasksView data={data} reviews={data?.reviews||[]} allResponses={data?.allResponses||[]} myEmail={myEmail} myEmp={myEmp} role={role} onReplyReview={replyToReview} onResolveReview={resolveReview} onSubmitVATask={submitVATask} fl={fl}/>}
    {tab==="artasks"&&<ARTasksView tasks={arTasks} data={data} myEmail={myEmail} myEmp={myEmp} role={role} onStart={null} onComplete={completeTask} onFlagHelp={flagHelp} onSubmitVATask={submitVATask} fl={fl}/>}
    {tab==="regional"&&<RegionalView data={data} allTasks={data?.activity||[]} queue={data?.helpQueue||[]} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} onToggleAbsence={toggleAbsence} fl={fl}/>}
    {tab==="oneonone"&&<OneOnOneView data={data} role={role} myEmail={myEmail} myEmp={myEmp} allTasks={data?.activity||[]} onSaveSession={saveSession} fl={fl}/>}
    {tab==="admin"&&<AdminView data={data} recurringDefs={data?.recurringDefs||[]} adhocTasks={adhocTasks} myEmail={myEmail} myEmp={myEmp} onSaveRec={saveRecurring} onAddRec={addRecurring} onToggleRec={toggleRecurring} onDeleteRec={deleteRecurring} onAssignAdhoc={assignAdhoc} onMissAdhoc={missAdhoc} fl={fl}/>}
  </div>;
}

// ============================================================
// ONE-ON-ONE VIEW
// ============================================================
function OneOnOneView({data,role,myEmail,myEmp,allTasks,onSaveSession,fl}){
  const[selPM,setSelPM]=useState("");
  const[showNew,setShowNew]=useState(false);
  const[wins,setWins]=useState("");
  const[improve,setImprove]=useState("");
  const[actions,setActions]=useState("");
  const[notes,setNotes]=useState("");
  const[addTaskOpen,setAddTaskOpen]=useState(false);
  const[newTaskDesc,setNewTaskDesc]=useState("");
  const[newTaskCat,setNewTaskCat]=useState("Admin/Other");
  const[newTaskCadence,setNewTaskCadence]=useState("Daily");
  const[newTaskPri,setNewTaskPri]=useState("Normal");
  const[pendingTasks,setPendingTasks]=useState([]);
  const[pmResponse,setPmResponse]=useState("");
  const[viewSession,setViewSession]=useState(null);

  const isRegional=role==="regional"||role==="admin";
  const isPM=isAnyPM(role)||role==="admin";
  const pms=data?.pms||[];
  const sessions=(data?.oneOnOneSessions||[]).sort((a,b)=>(b.SessionDate||"").localeCompare(a.SessionDate||""));

  // For PM view — only their sessions
  const mySessions=isPM&&!isRegional?sessions.filter(s=>s.PMEmail?.toLowerCase()===myEmail):sessions;
  const filteredSessions=selPM?mySessions.filter(s=>s.PMEmail?.toLowerCase()===selPM):mySessions;

  // Compute KPI snapshot for selected PM
  function computeSnap(pmEmail){
    const sevenAgo=new Date();sevenAgo.setDate(sevenAgo.getDate()-7);
    const pmTasks=allTasks.filter(t=>t.PMEmail?.toLowerCase()===pmEmail?.toLowerCase()&&new Date(t.ActivityDate||t.DueDate)>=sevenAgo);
    const done=pmTasks.filter(t=>getChoiceVal(t.Status)==="Completed");
    const onTime=done.filter(t=>t.CompletionStatus==="On Time"||!t.CompletionStatus);
    const late=done.filter(t=>t.CompletionStatus==="Late");
    const missed=pmTasks.filter(t=>getChoiceVal(t.Status)==="Missed");
    const helpQ=(data?.helpQueue||[]).filter(q=>q.RequestingPMEmail?.toLowerCase()===pmEmail?.toLowerCase()&&q.Status==="Open");
    const onTimePct=done.length?Math.round(onTime.length/done.length*100):null;
    const from=new Date(sevenAgo).toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const to=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    return{total:pmTasks.length,completed:done.length,onTime:onTime.length,late:late.length,missed:missed.length,onTimePct,helpQueue:helpQ.length,from,to};
  }

  const snap=selPM?computeSnap(selPM):null;
  const selectedPM=pms.find(p=>p.Email?.toLowerCase()===selPM);

  function handleSave(status){
    if(!selPM||!snap){fl("Select a PM first");return;}
    const session={
      PMEmail:selPM,PMName:selectedPM?.Name||selPM,
      RegionalEmail:myEmail,RegionalName:myEmp?.Name||myEmail,
      SessionDate:new Date().toISOString(),
      SnapTasksTotal:snap.total,SnapCompleted:snap.completed,SnapOnTime:snap.onTime,
      SnapLate:snap.late,SnapMissed:snap.missed,SnapOnTimePct:snap.onTimePct||0,
      SnapHelpQueue:snap.helpQueue,SnapPeriodFrom:snap.from,SnapPeriodTo:snap.to,
      Wins:wins,AreasToImprove:improve,ActionItems:actions,RegionalNotes:notes,
      TasksAddedJSON:JSON.stringify(pendingTasks),TasksAddedCount:pendingTasks.length,
      Status:status,
    };
    onSaveSession&&onSaveSession(session,pendingTasks);
    setShowNew(false);setWins("");setImprove("");setActions("");setNotes("");setPendingTasks([]);setAddTaskOpen(false);setNewTaskDesc("");
    fl(status==="Shared with PM"?`1:1 saved and shared with ${selectedPM?.Name}`:"1:1 saved as draft");
  }

  function addPendingTask(){
    if(!newTaskDesc.trim())return;
    setPendingTasks(p=>[...p,{desc:newTaskDesc,category:newTaskCat,cadence:newTaskCadence,priority:newTaskPri}]);
    setNewTaskDesc("");setAddTaskOpen(false);
  }

  const sessionStatusColor={Draft:C.b4,"Shared with PM":C.inf,Acknowledged:C.ok};

  return<div style={S.content}>
    {/* Header row */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontSize:17,fontWeight:700,color:C.t7}}>1:1 Sessions</div>
        <div style={{fontSize:12,color:C.b4}}>{isRegional?"Log coaching sessions with your PMs — captures a KPI snapshot at the time of the 1:1":"Your coaching session history with your Regional Manager"}</div>
      </div>
      {isRegional&&<button style={{...S.btn(C.g5,C.dk)}} onClick={()=>setShowNew(o=>!o)}>{showNew?"✕ Cancel":"+ New 1:1"}</button>}
    </div>

    {/* NEW SESSION FORM */}
    {showNew&&isRegional&&<div style={{...S.card,borderLeft:`3px solid ${C.g5}`}}>
      <div style={S.cardT}>New 1:1 Session</div>

      {/* PM Selector + live KPI snapshot */}
      <div style={{...S.row,marginBottom:12}}>
        <div style={{flex:1,minWidth:200}}>
          <label style={S.label}>PM *</label>
          <select style={S.select} value={selPM} onChange={e=>setSelPM(e.target.value)}>
            <option value="">Select PM...</option>
            {pms.map(p=><option key={p.Email} value={p.Email?.toLowerCase()}>{p.Name}</option>)}
          </select>
        </div>
      </div>

      {snap&&<div style={{background:C.t0,border:`1px solid ${C.t1}`,borderRadius:6,padding:12,marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.t6,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>📊 KPI Snapshot — Last 7 Days ({snap.from} – {snap.to})</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[{l:"Tasks",v:snap.total},{l:"Completed",v:snap.completed,c:C.ok},{l:"On Time %",v:snap.onTimePct!==null?`${snap.onTimePct}%`:"—",c:snap.onTimePct===null?C.b4:snap.onTimePct>=80?C.ok:snap.onTimePct>=60?C.wn:C.er},{l:"Late",v:snap.late,c:snap.late?C.wn:C.ok},{l:"Missed",v:snap.missed,c:snap.missed?C.er:C.ok},{l:"Help Queue",v:snap.helpQueue,c:snap.helpQueue?C.wn:C.ok}].map((k,i)=><KPI key={i} label={k.l} value={k.v} color={k.c}/>)}
        </div>
        <div style={{fontSize:10,color:C.b4,marginTop:8}}>This snapshot will be saved with the session log for both parties to reference.</div>
      </div>}

      {/* Coaching fields */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={S.label}>✅ Wins & Strengths</label>
          <textarea style={{...S.input,minHeight:80,resize:"vertical"}} value={wins} onChange={e=>setWins(e.target.value)} placeholder="What is this PM doing well? Specific examples..."/>
        </div>
        <div>
          <label style={S.label}>📈 Areas to Improve</label>
          <textarea style={{...S.input,minHeight:80,resize:"vertical"}} value={improve} onChange={e=>setImprove(e.target.value)} placeholder="What needs attention? Be specific and actionable..."/>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={S.label}>📋 Action Items</label>
        <textarea style={{...S.input,minHeight:60,resize:"vertical"}} value={actions} onChange={e=>setActions(e.target.value)} placeholder="Concrete next steps with owner and timeline..."/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>🔒 Regional Notes (not shared with PM)</label>
        <textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Internal observations, context, escalation notes..."/>
      </div>

      {/* Tasks to add from this session */}
      <div style={{background:C.g0,border:`1px solid ${C.g1}`,borderRadius:6,padding:12,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:pendingTasks.length?8:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.t7}}>📌 Add Recurring Tasks from This Session</div>
            <div style={{fontSize:11,color:C.b4,marginTop:2}}>If you identify a gap during the 1:1, add a recurring reminder for this PM right now</div>
          </div>
          <button style={{...S.btnO(C.g6,C.g5),...S.sm}} onClick={()=>setAddTaskOpen(o=>!o)}>{addTaskOpen?"Cancel":"+ Add Task"}</button>
        </div>
        {pendingTasks.length>0&&<div style={{marginBottom:8}}>
          {pendingTasks.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.g1}`}}>
            <span style={{fontSize:12}}>{catIcon[t.category]||"📋"}</span>
            <div style={{flex:1,fontSize:12,color:C.t7}}>{t.desc}</div>
            <span style={{fontSize:10,color:C.b4}}>{t.cadence} · {t.category}</span>
            <button style={{...S.btnO(C.er,C.er),...S.xs}} onClick={()=>setPendingTasks(p=>p.filter((_,j)=>j!==i))}>✕</button>
          </div>)}
        </div>}
        {addTaskOpen&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.g1}`}}>
          <div style={{...S.row,marginBottom:8}}>
            <div style={{flex:2}}><label style={S.label}>Description *</label><input style={S.input} value={newTaskDesc} onChange={e=>setNewTaskDesc(e.target.value)} placeholder="What should they do daily/weekly/monthly?"/></div>
            <div style={{flex:1}}><label style={S.label}>Category</label><select style={S.select} value={newTaskCat} onChange={e=>setNewTaskCat(e.target.value)}>{catList.map(c=><option key={c}>{c}</option>)}</select></div>
          </div>
          <div style={{...S.row,marginBottom:8}}>
            <div style={{flex:1}}><label style={S.label}>Cadence</label><select style={S.select} value={newTaskCadence} onChange={e=>setNewTaskCadence(e.target.value)}><option>Daily</option><option>Weekly</option><option>Monthly</option></select></div>
            <div style={{flex:1}}><label style={S.label}>Priority</label><select style={S.select} value={newTaskPri} onChange={e=>setNewTaskPri(e.target.value)}><option>Normal</option><option>High</option><option>Urgent</option></select></div>
          </div>
          <button style={{...S.btn(C.ok),...S.sm,width:"100%"}} onClick={addPendingTask}>+ Add to Session</button>
        </div>}
      </div>

      <div style={{display:"flex",gap:8}}>
        <button style={{...S.btnO(C.b4,C.b2),...S.sm}} onClick={()=>handleSave("Draft")}>Save Draft</button>
        <button style={{...S.btn(C.t7),...S.sm,flex:1}} onClick={()=>handleSave("Shared with PM")}>✓ Save & Share with {selectedPM?.Name||"PM"}</button>
      </div>
    </div>}

    {/* SESSION HISTORY */}
    {isRegional&&<div style={{...S.card,padding:"10px 14px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end",marginTop:showNew?0:0}}>
      <div style={{flex:1,minWidth:160}}><label style={S.label}>Filter by PM</label>
        <select style={S.select} value={selPM} onChange={e=>setSelPM(e.target.value)}>
          <option value="">All PMs</option>
          {pms.map(p=><option key={p.Email} value={p.Email?.toLowerCase()}>{p.Name}</option>)}
        </select>
      </div>
    </div>}

    <div>
      {!filteredSessions.length&&<div style={{...S.card,textAlign:"center",padding:40,color:C.b3,fontStyle:"italic"}}>No 1:1 sessions recorded yet.</div>}
      {filteredSessions.map((s,i)=>{
        const isExpanded=viewSession===s.id;
        return<div key={s.id||i} style={{...S.card,borderLeft:`3px solid ${sessionStatusColor[s.Status]||C.b2}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>setViewSession(isExpanded?null:s.id)}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.t7}}>{isRegional?s.PMName:"1:1 with Cara Munson"} <span style={{fontSize:11,fontWeight:400,color:C.b4}}>— {fD(s.SessionDate)}</span></div>
              <div style={{fontSize:11,color:C.b4,marginTop:2,display:"flex",gap:10}}>
                <span>Tasks: {s.SnapCompleted||0}/{s.SnapTasksTotal||0}</span>
                {s.SnapOnTimePct!==undefined&&<span>On Time: <strong style={{color:s.SnapOnTimePct>=80?C.ok:s.SnapOnTimePct>=60?C.wn:C.er}}>{s.SnapOnTimePct}%</strong></span>}
                {s.SnapMissed>0&&<span style={{color:C.er}}>Missed: {s.SnapMissed}</span>}
                {s.TasksAddedCount>0&&<span style={{color:C.g6}}>+{s.TasksAddedCount} tasks added</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              <Badge type={s.Status==="Acknowledged"?"success":s.Status==="Shared with PM"?"info":"neutral"}>{s.Status||"Draft"}</Badge>
              <span style={{fontSize:11,color:C.b4}}>{isExpanded?"▲":"▼"}</span>
            </div>
          </div>

          {isExpanded&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.b1}`}}>
            {/* KPI snapshot */}
            <div style={{background:C.t0,borderRadius:6,padding:10,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t6,textTransform:"uppercase",marginBottom:6}}>KPI Snapshot — {s.SnapPeriodFrom} – {s.SnapPeriodTo}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[{l:"Tasks",v:s.SnapTasksTotal||0},{l:"Done",v:s.SnapCompleted||0,c:C.ok},{l:"On Time%",v:s.SnapOnTimePct!==null?`${s.SnapOnTimePct}%`:"—",c:s.SnapOnTimePct>=80?C.ok:s.SnapOnTimePct>=60?C.wn:C.er},{l:"Late",v:s.SnapLate||0,c:s.SnapLate?C.wn:C.ok},{l:"Missed",v:s.SnapMissed||0,c:s.SnapMissed?C.er:C.ok},{l:"Help Q",v:s.SnapHelpQueue||0}].map((k,ki)=><KPI key={ki} label={k.l} value={k.v} color={k.c}/>)}
              </div>
            </div>

            {/* Coaching content */}
            {s.Wins&&<div style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:C.ok,textTransform:"uppercase",marginBottom:4}}>✅ Wins</div><div style={{fontSize:13,color:C.b6,lineHeight:1.5}}>{s.Wins}</div></div>}
            {s.AreasToImprove&&<div style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:C.wn,textTransform:"uppercase",marginBottom:4}}>📈 Areas to Improve</div><div style={{fontSize:13,color:C.b6,lineHeight:1.5}}>{s.AreasToImprove}</div></div>}
            {s.ActionItems&&<div style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:C.t6,textTransform:"uppercase",marginBottom:4}}>📋 Action Items</div><div style={{fontSize:13,color:C.b6,lineHeight:1.5}}>{s.ActionItems}</div></div>}
            {isRegional&&s.RegionalNotes&&<div style={{marginBottom:10,background:C.t0,borderRadius:4,padding:"8px 10px"}}><div style={{fontSize:11,fontWeight:700,color:C.t6,textTransform:"uppercase",marginBottom:4}}>🔒 Regional Notes</div><div style={{fontSize:12,color:C.b6}}>{s.RegionalNotes}</div></div>}

            {/* Tasks added */}
            {s.TasksAddedCount>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.g6,textTransform:"uppercase",marginBottom:4}}>📌 Recurring Tasks Added ({s.TasksAddedCount})</div>
              {(()=>{try{const ts=JSON.parse(s.TasksAddedJSON||"[]");return ts.map((t,ti)=><div key={ti} style={{fontSize:12,color:C.t7,padding:"3px 0",borderBottom:`1px solid ${C.b1}`}}>{catIcon[t.category]||"📋"} {t.desc} <span style={{color:C.b4}}>· {t.cadence} · {t.category}</span></div>);}catch{return null;}})()}
            </div>}

            {/* PM response */}
            {s.Status==="Shared with PM"&&!isPM&&<div style={{fontSize:11,color:C.b4,fontStyle:"italic",marginTop:8}}>Waiting for PM to acknowledge this session.</div>}
            {s.Status==="Shared with PM"&&isPM&&s.PMEmail?.toLowerCase()===myEmail&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.b1}`}}>
              <label style={S.label}>Your Response (optional)</label>
              <textarea style={{...S.input,minHeight:60,resize:"vertical",marginBottom:8}} value={pmResponse} onChange={e=>setPmResponse(e.target.value)} placeholder="Add any context or questions for your Regional..."/>
              <button style={{...S.btn(C.ok),...S.sm}} onClick={()=>{/* acknowledge */fl("Session acknowledged")}}>✓ Acknowledge & Respond</button>
            </div>}
            {s.PMResponse&&<div style={{marginTop:10,background:C.okb,borderRadius:4,padding:"8px 10px"}}><div style={{fontSize:11,fontWeight:700,color:C.ok,marginBottom:3}}>PM Response</div><div style={{fontSize:12,color:C.b6}}>{s.PMResponse}</div></div>}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
